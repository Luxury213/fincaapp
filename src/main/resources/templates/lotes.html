<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Lotes | FincaApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);
font-family:system-ui;
min-height:100vh;
}

/* NAVBAR */

.navbar{
background:#2E7D32;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.navbar-brand{
font-weight:600;
font-size:18px;
}

/* TITULO */

.page-title{
font-weight:700;
color:#1B5E20;
}

/* CARD FORM */

.form-card{

background:white;
border-radius:14px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

/* TABLE */

.table-container{

background:white;
border-radius:14px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

table{
width:100%;
}

th{
background:#E8F5E9;
color:#1B5E20;
}

td,th{
padding:12px;
}

/* INPUTS */

input{

border-radius:8px !important;

}

input:focus{

border-color:#66BB6A !important;
box-shadow:0 0 0 0.2rem rgba(102,187,106,0.25) !important;

}

/* BOTONES */

.btn-main{

background:#2E7D32;
border:none;
border-radius:8px;
color:white;

}

.btn-main:hover{

background:#1B5E20;

}

.btn-danger-custom{

background:#E53935;
border:none;
border-radius:8px;
color:white;

}

.btn-danger-custom:hover{

background:#C62828;

}

.btn-secondary-custom{

background:#90A4AE;
border:none;
border-radius:8px;
color:white;

}

.btn-secondary-custom:hover{

background:#78909C;

}

.btn-enter{

background:#66BB6A;
border:none;
border-radius:8px;
color:white;

}

.btn-enter:hover{

background:#4CAF50;

}

</style>

</head>

<body>


<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">

<img src="/images/banana-icon.svg" width="28">

FincaApp

</a>

</div>

</nav>


<div class="container mt-4">


<h2 class="page-title mb-4">

🌴 Gestión de Lotes

</h2>


<a href="/" class="btn btn-secondary-custom mb-4">

← Volver al inicio

</a>



<div class="form-card mb-4">

<h4 class="mb-3">

Crear nuevo lote

</h4>

<form action="/lotes" method="post">

<div class="row g-3">

<div class="col-md-6">

<label class="form-label">Nombre</label>

<input name="nombre" type="text" class="form-control" required>

</div>


<div class="col-md-6">

<label class="form-label">Cantidad de Palmas</label>

<input name="cantidadPalmas" type="number" min="1" class="form-control" required>

</div>

</div>

<br>

<button type="submit" class="btn btn-main">

Crear Lote

</button>

</form>

</div>



<div class="table-container">

<table class="table table-hover align-middle">

<thead>

<tr>

<th>Nombre</th>

<th>Palmas</th>

<th>Acciones</th>

</tr>

</thead>

<tbody>

<tr th:each="lote : ${lotes}">

<td th:text="${lote.nombre}"></td>

<td th:text="${lote.cantidadPalmas}"></td>

<td>

<a th:href="@{'/lotes/' + ${lote.id}}">

<button class="btn btn-enter btn-sm">

Entrar

</button>

</a>

<a th:href="@{'/lotes/editar/' + ${lote.id}}">

<button class="btn btn-secondary-custom btn-sm">

Editar

</button>

</a>

<form th:action="@{'/lotes/eliminar/' + ${lote.id}}"
      method="post"
      style="display:inline;">

<button class="btn btn-danger-custom btn-sm" type="submit">

Eliminar

</button>

</form>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>

</html>
