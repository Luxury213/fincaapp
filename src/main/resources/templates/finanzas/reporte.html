<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Reporte Financiero | FincaApp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">
<style>
body{background:linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);font-family:system-ui;min-height:100vh;transition:background 0.3s,color 0.3s;}
.navbar{background:#2E7D32;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.navbar-brand{font-weight:600;font-size:18px;}
.report-card{background:white;border-radius:16px;padding:35px;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
.page-title{font-size:24px;font-weight:700;color:#1B5E20;}
.total-amount{color:#2E7D32;font-size:2.5rem;font-weight:800;}
.btn-main{background:#2E7D32;border:none;border-radius:8px;padding:8px 18px;color:white;font-weight:500;}
.btn-main:hover{background:#1B5E20;color:white;}
hr{border-color:#C8E6C9;}

/* DARK MODE */
body.dark{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#e0e0e0;}
body.dark .page-title{color:#81c784;}
body.dark .report-card{background:#1e1e2e;box-shadow:0 10px 25px rgba(0,0,0,0.4);}
body.dark .total-amount{color:#81c784;}
body.dark hr{border-color:#2a3a2a;}
body.dark strong{color:#ccc;}
</style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">
      <img src="/images/banana-icon.svg" width="28"> FincaApp
    </a>
  </div>
</nav>

<div class="container mt-5" style="max-width:650px;">
  <div class="report-card">
    <div class="page-title mb-3">📄 Reporte de Pago</div>
    <hr>

    <p><strong>Trabajador:</strong> <span th:text="${trabajador.nombre}"></span></p>
    <p><strong>Mes:</strong> <span th:text="${mes}"></span></p>
    <p><strong>Año:</strong> <span th:text="${anio}"></span></p>
    <p><strong>Sueldo Base:</strong>
      <span th:text="${trabajador.sueldoBase != null ? '$ ' + trabajador.sueldoBase : '$ 0'}"></span>
    </p>

    <hr>

    <p class="mb-1"><strong>Total a pagar</strong></p>
    <div class="total-amount">$ <span th:text="${pago}"></span></div>

    <br>
    <a href="/finanzas" class="btn btn-main mt-2">← Volver</a>
  </div>
</div>

<script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');</script>
</body>
</html>
