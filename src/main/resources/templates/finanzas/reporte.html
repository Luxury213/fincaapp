<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Reporte Financiero</title>

</head>

<body>

<div class="container mt-4">

<h2>Reporte de Pago</h2>

<hr>

<p><strong>Trabajador:</strong>
<span th:text="${trabajador.nombre}"></span>
</p>

<p><strong>Mes:</strong>
<span th:text="${mes}"></span>
</p>

<p><strong>Año:</strong>
<span th:text="${anio}"></span>
</p>

<p><strong>Sueldo Base:</strong>
<span th:text="${trabajador.sueldoBase != null ? '$ ' + trabajador.sueldoBase : '$ 0'}"></span>
</p>

<hr>

<h3>Total a pagar</h3>

<h2 style="color:green">

$ <span th:text="${pago}"></span>

</h2>

<br>

<a href="/finanzas">

<button class="btn btn-primary">

Volver

</button>

</a>

</div>

</body>

</html>
