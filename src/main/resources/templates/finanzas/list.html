<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#F1F8E9;
}

.navbar{
background:#2E7D32;
}

.table-success{
background:#C8E6C9;
}

</style>

<title>Finanzas</title>

</head>

<body>

<nav class="navbar navbar-dark">
<a class="navbar-brand ms-3" href="/">
FincaApp - Finanzas
</a>
</nav>

<div class="container mt-4">

<h2 class="mb-4">Sueldos de Trabajadores</h2>

<table class="table table-striped table-bordered">

<thead class="table-success">

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Documento</th>
<th>Sueldo Base</th>
<th>Reporte</th>

</tr>

</thead>

<tbody>

<tr th:each="trabajador : ${trabajadores}">

<td th:text="${trabajador.id}"></td>
<td th:text="${trabajador.nombre}"></td>
<td th:text="${trabajador.documento}"></td>

<td>
<span th:text="${trabajador.sueldoBase != null ? '$ ' + trabajador.sueldoBase : '$ 0'}"></span>
</td>

<td>

<a th:href="@{/finanzas/reporte/{id}(id=${trabajador.id},mes=3,anio=2026)}"
class="btn btn-success">

Ver reporte

</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
