<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Trabajadores | FincaApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);
font-family:system-ui;
min-height:100vh;
}

/* NAVBAR */

.navbar{
background:#2E7D32;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.navbar-brand{
font-weight:600;
font-size:18px;
}

/* CONTAINER CARD */

.page-card{

background:white;
border-radius:16px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

/* TITLE */

.page-title{

font-size:26px;
font-weight:700;
color:#1B5E20;

}

/* BUTTONS */

.btn-main{

background:#2E7D32;
border:none;
border-radius:8px;
padding:8px 18px;
color:white;
font-weight:500;

}

.btn-main:hover{

background:#1B5E20;

}

.btn-edit{

background:#66BB6A;
border:none;

}

.btn-delete{

background:#E53935;
border:none;

}

/* TABLE */

.table thead{

background:#C8E6C9;

}

.table tbody tr:hover{

background:#F1F8E9;

}

</style>

</head>

<body>


<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">

<img src="/images/banana-icon.svg" width="28">

FincaApp

</a>

</div>

</nav>


<div class="container mt-5">

<div class="page-card">

<div class="d-flex justify-content-between align-items-center mb-4">

<div class="page-title">

👷 Trabajadores

</div>

<a th:href="@{/trabajadores/nuevo}" class="btn btn-main">

+ Nuevo Trabajador

</a>

</div>


<table class="table table-hover align-middle">

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>Documento</th>
<th>Teléfono</th>
<th>Sueldo Base</th>
<th style="width:170px;">Acciones</th>

</tr>

</thead>


<tbody>

<tr th:each="trabajador : ${trabajadores}">

<td th:text="${trabajador.id}"></td>

<td th:text="${trabajador.nombre}"></td>

<td th:text="${trabajador.documento}"></td>

<td th:text="${trabajador.telefono}"></td>

<td th:text="'$ ' + ${trabajador.sueldoBase}"></td>

<td>

<a th:href="@{/trabajadores/editar/{id}(id=${trabajador.id})}"
   class="btn btn-edit btn-sm text-white">

Editar

</a>

<a th:href="@{/trabajadores/eliminar/{id}(id=${trabajador.id})}"
   class="btn btn-delete btn-sm text-white"
   onclick="return confirm('¿Seguro que deseas eliminar?')">

Eliminar

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>


</body>

</html>
