<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">

    <style>
        body {
            background: #F1F8E9;
            color: #212121;
        }
        .navbar, .btn-primary {
            background-color: #2E7D32 !important;
        }
        .btn-success {
            background-color: #66BB6A !important;
        }
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: #E8F5E9;
        }
    </style>

    <title>Trabajadores</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="/">
        <img src="/images/banana-icon.svg" width="30" height="30"> FincaApp
    </a>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Lista de Trabajadores</h2>
        <a th:href="@{/trabajadores/nuevo}" class="btn btn-primary">
            + Nuevo Trabajador
        </a>
    </div>

    <table class="table table-striped table-bordered shadow-sm">
        <thead class="table-success">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Documento</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="trabajador : ${trabajadores}">
            <td th:text="${trabajador.id}"></td>
            <td th:text="${trabajador.nombre}"></td>
            <td th:text="${trabajador.documento}"></td>
            <td th:text="${trabajador.telefono}"></td>
            <td>
                <a th:href="@{/trabajadores/editar/{id}(id=${trabajador.id})}"
                   class="btn btn-success btn-sm">Editar</a>

                <a th:href="@{/trabajadores/eliminar/{id}(id=${trabajador.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas eliminar?')">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
