<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">

    <style>
        body {
            background: #F1F8E9;
            color: #212121;
        }
        .btn-success {
            background-color: #66BB6A !important;
        }
        .btn-secondary {
            background-color: #2E7D32 !important;
        }
    </style>

    <title>Registrar / Editar Trabajador</title>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background: #2E7D32;">
    <a class="navbar-brand" href="/">
        <img src="/images/banana-icon.svg" width="30" height="30"> FincaApp
    </a>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm p-4 border-success">
        <h3 class="mb-4 text-success">Registrar / Editar Trabajador</h3>

        <form th:action="@{/trabajadores/guardar}"
              th:object="${trabajador}"
              method="post">

            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Documento</label>
                <input type="text" class="form-control" th:field="*{documento}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" class="form-control" th:field="*{telefono}">
            </div>

            <div class="d-flex justify-content-between">
                <a th:href="@{/trabajadores}" class="btn btn-secondary">Volver</a>
                <button type="submit" class="btn btn-success">Guardar</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
