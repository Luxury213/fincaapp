<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Registrar Trabajador | FincaApp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">
<style>
body{background:linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);font-family:system-ui;min-height:100vh;transition:background 0.3s,color 0.3s;}
.navbar{background:#2E7D32;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
.navbar-brand{font-weight:600;font-size:18px;}
.form-card{background:white;border-radius:16px;padding:35px;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
.page-title{font-size:24px;font-weight:700;color:#1B5E20;}
.form-control{border-radius:8px;padding:10px;}
.form-control:focus{border-color:#66BB6A;box-shadow:0 0 0 0.2rem rgba(102,187,106,0.25);}
.btn-main{background:#2E7D32;border:none;border-radius:8px;padding:8px 18px;color:white;font-weight:500;}
.btn-main:hover{background:#1B5E20;color:white;}
.btn-secondary-custom{background:#90A4AE;border:none;color:white;border-radius:8px;padding:8px 18px;}
.btn-secondary-custom:hover{background:#78909C;color:white;}

/* DARK MODE */
body.dark{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#e0e0e0;}
body.dark .page-title{color:#81c784;}
body.dark .form-card{background:#1e1e2e;box-shadow:0 10px 25px rgba(0,0,0,0.4);}
body.dark .form-control{background:#2a2a3e;color:#e0e0e0;border-color:#444;}
body.dark .form-label{color:#ccc;}
</style>
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">
      <img src="/images/banana-icon.svg" width="28"> FincaApp
    </a>
  </div>
</nav>

<div class="container mt-5" style="max-width:650px;">
  <div class="form-card">
    <div class="page-title mb-4">👷 Registrar / Editar Trabajador</div>
    <form th:action="@{/trabajadores/guardar}" th:object="${trabajador}" method="post">
      <input type="hidden" th:field="*{id}" />

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" th:field="*{nombre}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Documento</label>
        <input type="text" class="form-control" th:field="*{documento}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Teléfono</label>
        <input type="text" class="form-control" th:field="*{telefono}">
      </div>
      <div class="mb-4">
        <label class="form-label">Sueldo Base</label>
        <input type="number" step="0.01" class="form-control" th:field="*{sueldoBase}" placeholder="Ej: 1200000">
      </div>

      <div class="d-flex justify-content-between">
        <a th:href="@{/trabajadores}" class="btn btn-secondary-custom">Volver</a>
        <button type="submit" class="btn btn-main">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>if(localStorage.getItem('theme')==='dark')document.body.classList.add('dark');</script>
</body>
</html>
