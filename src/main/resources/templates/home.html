<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>FincaApp - Panel Principal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

/* ===== MODO CLARO (default) ===== */
body {
  background: linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);
  font-family: system-ui;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, color 0.3s;
}

.dashboard {
  width: 90%;
  max-width: 1200px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand-title {
  font-size: 70px;
  font-weight: 800;
  color: #1B5E20;
}

.brand-desc {
  font-size: 18px;
  color: #555;
  margin-top: 10px;
}

.modules {
  display: flex;
  gap: 30px;
}

.module-card {
  width: 230px;
  background: white;
  border-radius: 18px;
  padding: 30px;
  text-align: center;
  transition: all 0.25s;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.module-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.15);
}

.module-icon { font-size: 50px; margin-bottom: 15px; }
.module-title { font-size: 20px; font-weight: 600; }
.module-desc  { font-size: 14px; color: #777; margin-bottom: 20px; }

.module-btn {
  background: #2E7D32;
  border: none;
  padding: 10px 22px;
  border-radius: 8px;
  color: white;
  font-weight: 500;
  transition: 0.2s;
  text-decoration: none;
  display: inline-block;
}

.module-btn:hover { background: #1B5E20; color: white; }

/* ===== BOTON TOGGLE ===== */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #2E7D32;
  color: white;
  border: none;
  border-radius: 50px;
  padding: 8px 18px;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
  z-index: 999;
}

.theme-toggle:hover { background: #1B5E20; }

/* ===== MODO OSCURO ===== */
body.dark {
  background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  color: #e0e0e0;
}

body.dark .brand-title { color: #81c784; }
body.dark .brand-desc  { color: #aaa; }

body.dark .module-card {
  background: #1e1e2e;
  box-shadow: 0 6px 18px rgba(0,0,0,0.4);
}

body.dark .module-title { color: #e0e0e0; }
body.dark .module-desc  { color: #aaa; }

body.dark .module-btn {
  background: #388e3c;
}

body.dark .module-btn:hover { background: #2e7d32; }

body.dark .theme-toggle {
  background: #81c784;
  color: #1a1a2e;
}

</style>
</head>

<body>

<!-- BOTON MODO OSCURO -->
<button class="theme-toggle" onclick="toggleTheme()">🌙 Modo oscuro</button>

<div class="dashboard">

  <!-- LADO IZQUIERDO -->
  <div class="brand-section" style="max-width:350px;">
    <div class="brand-title">🌿 FincaApp</div>
    <div class="brand-desc">
      Sistema de gestión agrícola para administrar
      lotes, trabajadores y finanzas de la finca.
    </div>
  </div>

  <!-- LADO DERECHO -->
  <div class="modules">

    <div class="module-card">
      <div class="module-icon">🌴</div>
      <div class="module-title">Lotes</div>
      <div class="module-desc">Administrar lotes y labores</div>
      <a th:href="@{/lotes}" class="module-btn">Entrar</a>
    </div>

    <div class="module-card">
      <div class="module-icon">👷</div>
      <div class="module-title">Trabajadores</div>
      <div class="module-desc">Gestión de empleados</div>
      <a th:href="@{/trabajadores}" class="module-btn">Entrar</a>
    </div>

    <div class="module-card">
      <div class="module-icon">💰</div>
      <div class="module-title">Finanzas</div>
      <div class="module-desc">Control de gastos y pagos</div>
      <a th:href="@{/finanzas}" class="module-btn">Entrar</a>
    </div>

  </div>
</div>

<script>
  // Al cargar la página, aplicar el tema guardado
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.querySelector('.theme-toggle').textContent = '☀️ Modo claro';
  }

  function toggleTheme() {
    const btn = document.querySelector('.theme-toggle');
    if (document.body.classList.toggle('dark')) {
      localStorage.setItem('theme', 'dark');
      btn.textContent = '☀️ Modo claro';
    } else {
      localStorage.setItem('theme', 'light');
      btn.textContent = '🌙 Modo oscuro';
    }
  }

    // Mantener servidor despierto
  setInterval(() => {
    fetch('/actuator/health').catch(() => {});
  }, 14 * 60 * 1000);
  
</script>

</body>
</html>
