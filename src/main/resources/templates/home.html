<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>FincaApp - Panel Principal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: linear-gradient(135deg,#F1F8E9,#E8F5E9);
            font-family: Arial;
        }

        .navbar{
            background:#2E7D32;
        }

        .main-title{
            color:#1B5E20;
            font-weight:bold;
        }

        .card-hover{
            border-radius:20px;
            transition:0.3s;
        }

        .card-hover:hover{

            transform:translateY(-6px);
            box-shadow:0px 10px 25px rgba(0,0,0,0.2);

        }

        .icon{

            font-size:50px;

        }

        .footer{

            margin-top:80px;
            text-align:center;
            color:#777;

        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<span class="navbar-brand">

🌿 FincaApp

</span>

</div>

</nav>


<div class="container mt-5">


<div class="text-center mb-5">

<h1 class="main-title">

Panel de Gestión

</h1>

<p class="text-muted">

Sistema de administración de finca

</p>

</div>



<div class="row g-5 justify-content-center">


<!-- LOTES -->

<div class="col-md-4">

<a th:href="@{/lotes}" style="text-decoration:none;">

<div class="card shadow card-hover p-5 text-center">

<div class="icon">

🌴

</div>

<h4 class="mt-3">

Lotes

</h4>

<p class="text-muted">

Administrar lotes y labores

</p>

</div>

</a>

</div>



<!-- TRABAJADORES -->

<div class="col-md-4">

<a th:href="@{/trabajadores}" style="text-decoration:none;">

<div class="card shadow card-hover p-5 text-center">

<div class="icon">

👷

</div>

<h4 class="mt-3">

Trabajadores

</h4>

<p class="text-muted">

Administrar trabajadores

</p>

</div>

</a>

</div>


</div>


<div class="footer">

FincaApp 🌿 Sistema de Gestión

</div>


</div>

</body>

</html>
