<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>FincaApp - Panel Principal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);
font-family:system-ui;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* CONTENEDOR PRINCIPAL */

.dashboard{
width:90%;
max-width:1200px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* LADO IZQUIERDO */

.brand-section{
max-width:350px;
}

.brand-title{
font-size:70px;
font-weight:800;
color:#1B5E20;
}

.brand-desc{
font-size:18px;
color:#555;
margin-top:10px;
}

/* LADO DERECHO */

.modules{
display:flex;
gap:30px;
}

/* TARJETAS */

.module-card{

width:230px;
background:white;
border-radius:18px;
padding:30px;
text-align:center;
transition:all 0.25s;
box-shadow:0 6px 18px rgba(0,0,0,0.08);

}

.module-card:hover{

transform:translateY(-8px);
box-shadow:0 12px 28px rgba(0,0,0,0.15);

}

.module-icon{

font-size:50px;
margin-bottom:15px;

}

.module-title{

font-size:20px;
font-weight:600;

}

.module-desc{

font-size:14px;
color:#777;
margin-bottom:20px;

}

/* BOTONES */

.module-btn{

background:#2E7D32;
border:none;
padding:10px 22px;
border-radius:8px;
color:white;
font-weight:500;
transition:0.2s;
text-decoration:none;
display:inline-block;

}

.module-btn:hover{

background:#1B5E20;
color:white;

}

</style>

</head>

<body>


<div class="dashboard">

<!-- LADO IZQUIERDO -->

<div class="brand-section">

<div class="brand-title">
🌿 FincaApp
</div>

<div class="brand-desc">
Sistema de gestión agrícola para administrar
lotes, trabajadores y finanzas de la finca.
</div>

</div>


<!-- LADO DERECHO -->

<div class="modules">

<!-- LOTES -->

<div class="module-card">

<div class="module-icon">
🌴
</div>

<div class="module-title">
Lotes
</div>

<div class="module-desc">
Administrar lotes y labores
</div>

<a th:href="@{/lotes}" class="module-btn">
Entrar
</a>

</div>


<!-- TRABAJADORES -->

<div class="module-card">

<div class="module-icon">
👷
</div>

<div class="module-title">
Trabajadores
</div>

<div class="module-desc">
Gestión de empleados
</div>

<a th:href="@{/trabajadores}" class="module-btn">
Entrar
</a>

</div>


<!-- FINANZAS -->

<div class="module-card">

<div class="module-icon">
💰
</div>

<div class="module-title">
Finanzas
</div>

<div class="module-desc">
Control de gastos y pagos
</div>

<a th:href="@{/finanzas}" class="module-btn">
Entrar
</a>

</div>

</div>

</div>


</body>

</html>
```
