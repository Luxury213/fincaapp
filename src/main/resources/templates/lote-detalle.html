<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Detalle del Lote | FincaApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="icon" type="image/svg+xml" href="/images/banana-icon.svg">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8e9,#e0f2f1);
font-family:system-ui;
min-height:100vh;
}

/* NAVBAR */

.navbar{
background:#2E7D32;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.navbar-brand{
font-weight:600;
font-size:18px;
}

/* TITULOS */

.page-title{
color:#1B5E20;
font-weight:700;
}

.section-title{
color:#2E7D32;
font-weight:600;
margin-bottom:15px;
}

/* CARDS */

.card-custom{
background:white;
border-radius:14px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* TABLA */

.table-container{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

th{
background:#E8F5E9;
color:#1B5E20;
}

td,th{
padding:12px;
vertical-align:middle;
}

/* INPUTS */

input,select{

border-radius:8px !important;

}

input:focus,select:focus{

border-color:#66BB6A !important;
box-shadow:0 0 0 0.2rem rgba(102,187,106,0.25) !important;

}

/* BOTONES */

.btn-main{
background:#2E7D32;
border:none;
border-radius:8px;
color:white;
}

.btn-main:hover{
background:#1B5E20;
}

.btn-success-custom{
background:#66BB6A;
border:none;
border-radius:8px;
color:white;
}

.btn-success-custom:hover{
background:#4CAF50;
}

.btn-danger-custom{
background:#E53935;
border:none;
border-radius:8px;
color:white;
}

.btn-danger-custom:hover{
background:#C62828;
}

.btn-secondary-custom{
background:#90A4AE;
border:none;
border-radius:8px;
color:white;
}

.btn-secondary-custom:hover{
background:#78909C;
}

</style>

</head>

<body>


<nav class="navbar navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">

<img src="/images/banana-icon.svg" width="28">

FincaApp

</a>

</div>

</nav>


<div class="container mt-4">

<h2 class="page-title mb-4">

🌴 Detalle del Lote

</h2>


<div class="card-custom">

<h5 class="section-title">Información del lote</h5>

<p>

<strong>Nombre:</strong>
<span th:text="${lote.nombre}"></span>

</p>

<p>

<strong>Cantidad de palmas:</strong>
<span th:text="${lote.cantidadPalmas}"></span>

</p>

</div>



<div class="card-custom">

<h5 class="section-title">Crear nueva labor</h5>

<form th:action="@{/labores/crear/{id}(id=${lote.id})}" method="post">

<div class="row g-3">

<div class="col-md-4">

<label class="form-label">Tipo</label>

<select name="tipo" class="form-control">

<option value="Polinizacion">Polinizacion</option>
<option value="Fertilizacion">Fertilizacion</option>
<option value="Control malezas">Control malezas</option>
<option value="Sanidad">Sanidad</option>
<option value="Cosecha">Cosecha</option>

</select>

</div>


<div class="col-md-2">

<label class="form-label">Frecuencia</label>

<input type="number" name="frecuenciaDias" class="form-control" required>

</div>


<div class="col-md-3">

<label class="form-label">Última ejecución</label>

<input type="date" name="fechaUltimaEjecucion" class="form-control" required>

</div>


<div class="col-md-3">

<label class="form-label">Trabajador</label>

<select name="trabajadorId" class="form-control" required>

<option th:each="t : ${trabajadores}"
        th:value="${t.id}"
        th:text="${t.nombre}">
</option>

</select>

</div>


<div class="col-md-3">

<label class="form-label">Costo</label>

<input type="number" step="0.01" name="precio" class="form-control" required>

</div>

</div>

<br>

<button class="btn btn-main">

Crear Labor

</button>

</form>

</div>



<div class="table-container">

<h5 class="section-title">Labores del lote</h5>

<table class="table table-hover">

<thead>

<tr>

<th>Tipo</th>
<th>Frecuencia</th>
<th>Última ejecución</th>
<th>Próxima fecha</th>
<th>Trabajador</th>
<th>Costo</th>
<th>Acciones</th>

</tr>

</thead>

<tbody>

<tr th:each="labor : ${labores}">

<td th:text="${labor.tipo}"></td>

<td th:text="${labor.frecuenciaDias}"></td>

<td th:text="${labor.fechaUltimaEjecucion}"></td>

<td th:text="${labor.proximaFecha}"></td>

<td>

<form th:action="@{/labores/actualizar/{id}(id=${labor.id})}" method="post">

<input type="hidden" name="tipo" th:value="${labor.tipo}">
<input type="hidden" name="frecuenciaDias" th:value="${labor.frecuenciaDias}">
<input type="hidden" name="fechaUltimaEjecucion" th:value="${labor.fechaUltimaEjecucion}">

<select name="trabajadorId" class="form-control" required>

<option th:each="t : ${trabajadores}"
        th:value="${t.id}"
        th:text="${t.nombre}"
        th:selected="${labor.trabajador != null && labor.trabajador.id == t.id}">
</option>

</select>

</td>

<td>

<input type="number"
       step="0.01"
       name="precio"
       th:value="${labor.precio}"
       class="form-control"
       required>

</td>

<td>

<button type="submit" class="btn btn-success-custom btn-sm">

Actualizar

</button>

</form>

<br>

<form th:action="@{'/labores/ejecutar/' + ${labor.id}}" method="post">

<button class="btn btn-main btn-sm">

Ejecutar

</button>

</form>

<br>

<form th:action="@{'/labores/eliminar/' + ${labor.id}}" method="post">

<button class="btn btn-danger-custom btn-sm">

Eliminar

</button>

</form>

</td>

</tr>

</tbody>

</table>

</div>


<a href="/lotes">

<button class="btn btn-secondary-custom mt-4">

Volver

</button>

</a>


</div>

</body>

</html>
