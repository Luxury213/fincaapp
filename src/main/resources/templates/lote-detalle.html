<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Detalle del Lote</title>

<style>

body{
font-family: Arial;
margin:20px;
}

h1,h2{
color:#2c3e50;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:left;
}

th{
background:#f2f2f2;
}

button{
padding:6px 12px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:15px;
margin-top:20px;
border-radius:6px;
background:#fafafa;
}

.inline{
display:inline;
}

</style>

</head>

<body>

<h1>Detalle del Lote</h1>

Nombre:
<span th:text="${lote.nombre}"></span>

<br><br>

Cantidad de palmas:
<span th:text="${lote.cantidadPalmas}"></span>

<br><br>

<hr>

<h2>Crear nueva labor</h2>

<form th:action="@{/labores/crear/{id}(id=${lote.id})}" method="post">

Tipo:

<select name="tipo">

<option value="Polinizacion">Polinizacion</option>
<option value="Fertilizacion">Fertilizacion</option>
<option value="Control malezas">Control malezas</option>
<option value="Sanidad">Sanidad</option>
<option value="Cosecha">Cosecha</option>

</select>

<br><br>

Frecuencia dias:

<input type="number" name="frecuenciaDias" required>

<br><br>

Fecha ultima ejecucion:

<input type="date" name="fechaUltimaEjecucion" required>

<br><br>

Trabajador:

<select name="trabajadorId" required>

<option th:each="t : ${trabajadores}"
        th:value="${t.id}"
        th:text="${t.nombre}">
</option>

</select>

<br><br>

Costo de la labor:

<input type="number" step="0.01" name="precio" required>

<br><br>

<button>

Crear Labor

</button>

</form>


<hr>

<h2>Labores del lote</h2>

<table>

<tr>
<th>Tipo</th>
<th>Frecuencia</th>
<th>Ultima ejecucion</th>
<th>Proxima fecha</th>
<th>Trabajador</th>
<th>Costo</th>
<th>Acciones</th>
</tr>

<tr th:each="labor : ${labores}">

<td th:text="${labor.tipo}"></td>

<td th:text="${labor.frecuenciaDias}"></td>

<td th:text="${labor.fechaUltimaEjecucion}"></td>

<td th:text="${labor.proximaFecha}"></td>

<td>

<form th:action="@{/labores/actualizar/{id}(id=${labor.id})}" method="post">

<!-- CAMPOS OCULTOS NECESARIOS -->

<input type="hidden" name="tipo" th:value="${labor.tipo}">

<input type="hidden" name="frecuenciaDias" th:value="${labor.frecuenciaDias}">

<input type="hidden" name="fechaUltimaEjecucion" th:value="${labor.fechaUltimaEjecucion}">


<select name="trabajadorId" required>

<option th:each="t : ${trabajadores}"
        th:value="${t.id}"
        th:text="${t.nombre}"
        th:selected="${labor.trabajador != null && labor.trabajador.id == t.id}">
</option>

</select>

</td>

<td>

<input type="number"
       step="0.01"
       name="precio"
       th:value="${labor.precio}"
       required>

</td>

<td>

<button type="submit">

Actualizar

</button>

</form>

<br>

<form th:action="@{'/labores/ejecutar/' + ${labor.id}}" method="post">

<button>

Ejecutar

</button>

</form>

<br>

<form th:action="@{'/labores/eliminar/' + ${labor.id}}" method="post">

<button>

Eliminar

</button>

</form>

</td>

</tr>

</table>


<br>

<a href="/lotes">

<button>

Volver

</button>

</a>

</body>

</html>
